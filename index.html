<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>I-Tennis Mobile</title>
<style>
body{margin:0;background:#f7fbf8;color:#24332B;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}
header{position:sticky;top:0;background:#07522d;color:white;padding:14px 16px;z-index:10}h1{margin:0;font-size:21px}header p{margin:4px 0 0;font-size:12px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:white;position:sticky;top:57px;z-index:9;border-bottom:1px solid #cde4d4}.tabs button{border:1px solid #cde4d4;background:#eaf7ef;color:#07522d;border-radius:999px;padding:9px;font-weight:700}.tabs button.active{background:#08763d;color:white}
main{padding:12px;max-width:720px;margin:auto}.section{display:none}.section.active{display:block}.card{background:white;border:1px solid #cde4d4;border-radius:14px;padding:13px;margin-bottom:10px}.date{font-weight:800;color:#07522d;margin-bottom:5px}.title{font-weight:700}.meta{color:#6b7a70;font-size:13px;margin-top:4px}.empty{text-align:center;color:#6b7a70;padding:35px;background:white;border:1px dashed #cde4d4;border-radius:14px}
.toolbar{display:flex;gap:8px;margin-bottom:10px}.toolbar input{flex:1;border:1px solid #cde4d4;border-radius:10px;padding:10px;font-size:15px}.toolbar button{border:0;background:#08763d;color:white;border-radius:10px;padding:10px 12px;font-weight:800}.notice{background:#fff8d6;border:1px solid #f0d98c;border-radius:12px;padding:10px;margin-bottom:10px;font-size:13px;color:#5b4b00}
.calendar{background:white;border:1px solid #cde4d4;border-radius:14px;overflow:hidden;margin-bottom:12px}.cal-head{display:flex;justify-content:space-between;align-items:center;background:#6750A4;color:white;padding:10px;font-weight:800}.cal-head button{background:white;color:#6750A4;border:0;border-radius:8px;padding:6px 10px;font-weight:800}
.week,.days{display:grid;grid-template-columns:repeat(7,1fr)}.week div{text-align:center;padding:7px 0;font-size:12px;font-weight:800;background:#f5f8f5}.day{min-height:54px;border-right:1px solid #edf3ef;border-bottom:1px solid #edf3ef;padding:5px;font-size:12px}.day.has{background:#f4fbf6}.day.today{background:#fff3bf}.num{font-weight:800}.mark{display:block;margin-top:2px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#07522d;font-weight:700}
.modal-bg{display:none;position:fixed;inset:0;background:#0007;z-index:99;padding:18px;align-items:center;justify-content:center}.modal-bg.active{display:flex}.modal{background:white;border-radius:16px;width:100%;max-width:430px;padding:16px}.modal h2{margin:0 0 12px;color:#07522d}.field{margin-bottom:10px}.field label{display:block;font-size:12px;font-weight:800;color:#6b7a70;margin-bottom:4px}.field input,.field select,.field textarea{width:100%;border:1px solid #cde4d4;border-radius:10px;padding:10px;font-size:16px}.field textarea{min-height:70px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.actions button{border:0;border-radius:10px;padding:11px;font-weight:800}.save{background:#08763d;color:white}.cancel{background:#e9efe9;color:#244}.delete{background:#b3261e;color:white}
</style></head>
<body>
<header><h1>🎾 I-Tennis Mobile</h1><p id="updated">読み込み中...</p></header>
<nav class="tabs"><button id="tabSchedule" class="active" onclick="showTab('schedule')">📅 予定</button><button id="tabTournaments" onclick="showTab('tournaments')">🏆 大会</button><button id="tabCalendar" onclick="showTab('calendar')">🗓 カレンダー</button></nav>
<main>
<section id="schedule" class="section active"><div class="notice">予定はこのスマホ内に保存されます。Windows同期は次の段階です。</div><div class="toolbar"><input id="searchSchedule" placeholder="予定を検索" oninput="renderAll()"><button onclick="openAddModal()">＋追加</button></div><div id="scheduleList"></div></section>
<section id="tournaments" class="section"><div class="toolbar"><input id="searchTournament" placeholder="大会を検索" oninput="renderAll()"></div><div id="tournamentList"></div></section>
<section id="calendar" class="section"><div class="calendar"><div class="cal-head"><button onclick="moveMonth(-1)">◀</button><div id="calTitle"></div><button onclick="moveMonth(1)">▶</button></div><div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div id="calendarDays" class="days"></div></div><div id="calendarDetail"></div></section>
</main>
<div id="modalBg" class="modal-bg"><div class="modal"><h2 id="modalTitle">予定追加</h2><input type="hidden" id="editIndex"><div class="field"><label>日付</label><input id="fDate" type="date"></div><div class="field"><label>時間</label><input id="fTime" type="time"></div><div class="field"><label>種類</label><select id="fKind"><option>🎾 練習</option><option>🏆 大会</option><option>🍽 食事</option><option>💼 仕事</option><option>その他</option></select></div><div class="field"><label>場所</label><input id="fPlace"></div><div class="field"><label>メモ</label><textarea id="fMemo"></textarea></div><div class="actions"><button class="cancel" onclick="closeModal()">キャンセル</button><button class="save" onclick="saveActivityFromModal()">保存</button></div><div class="actions" id="deleteArea" style="display:none;grid-template-columns:1fr;margin-top:8px"><button class="delete" onclick="deleteActivityFromModal()">この予定を削除</button></div></div></div>
<script>
const STORAGE_KEY='i_tennis_mobile_activities_v1';let appData={activities:[],tournament_dates:[]},current=new Date();
function parseDate(s){if(!s)return null;let m=String(s).replace(/[年月.-]/g,'/').replace(/日/g,'').match(/(20\d{2})\/(\d{1,2})\/(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null}
function toSlashDate(v){if(!v)return'';if(v.includes('-')){let a=v.split('-');return a[0]+'/'+a[1]+'/'+a[2]}return v}
function toInputDate(v){let d=parseDate(v);return d?d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'):''}
function dateKey(d){return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')}
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function sortRows(r){return [...r].sort((a,b)=>(parseDate(a.date)?.getTime()||9e15)-(parseDate(b.date)?.getTime()||9e15)||String(a.time||'').localeCompare(String(b.time||'')))}
function saveLocal(){localStorage.setItem(STORAGE_KEY,JSON.stringify(appData.activities||[]));appData.updated_at='スマホ内保存 '+new Date().toLocaleString('ja-JP');document.getElementById('updated').textContent='更新: '+appData.updated_at+' / '+(appData.version||'')}
function loadLocal(){let s=localStorage.getItem(STORAGE_KEY);if(s){try{appData.activities=JSON.parse(s)||[]}catch(e){}}}
async function loadData(){try{appData=await (await fetch('i_tennis_mobile_data.json?ts='+Date.now())).json()}catch(e){appData={activities:[],tournament_dates:[],updated_at:'読み込み失敗',version:'I-Tennis Mobile 1.2'}}loadLocal();document.getElementById('updated').textContent='更新: '+(appData.updated_at||'')+' / '+(appData.version||'');let d=[...(appData.activities||[]),...(appData.tournament_dates||[])].map(x=>parseDate(x.date)).find(Boolean);if(d)current=new Date(d.getFullYear(),d.getMonth(),1);renderAll()}
function showTab(n){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById(n).classList.add('active');document.getElementById('tab'+n[0].toUpperCase()+n.slice(1)).classList.add('active');renderAll()}
function renderSchedule(){let q=document.getElementById('searchSchedule').value.toLowerCase();let rows=sortRows(appData.activities||[]).map((r)=>({...r,_index:(appData.activities||[]).indexOf(r)})).filter(r=>[r.date,r.time,r.place,r.kind,r.memo].join(' ').toLowerCase().includes(q));document.getElementById('scheduleList').innerHTML=rows.length?rows.map(r=>'<div class="card" onclick="openEditModal('+r._index+')"><div class="date">'+esc(r.date)+' '+esc(r.time)+'</div><div class="title">'+esc(r.memo||r.place||r.kind)+'</div><div class="meta">'+esc(r.kind)+' '+esc(r.place)+'</div></div>').join(''):'<div class="empty">予定はありません<br>＋追加から登録できます</div>'}
function renderTournaments(){let q=document.getElementById('searchTournament').value.toLowerCase();let rows=sortRows(appData.tournament_dates||[]).filter(r=>[r.date,r.display_title,r.title,r.area,r.type].join(' ').toLowerCase().includes(q));document.getElementById('tournamentList').innerHTML=rows.length?rows.map(r=>'<div class="card"><div class="date">'+esc(r.date)+'</div><div class="title">🏆 '+esc(r.display_title||r.title||'大会')+'</div><div class="meta">'+esc(r.area)+' '+esc(r.type)+'</div></div>').join(''):'<div class="empty">登録大会はありません</div>'}
function renderCalendar(){let y=current.getFullYear(),m=current.getMonth();document.getElementById('calTitle').textContent=y+'年'+(m+1)+'月';let first=new Date(y,m,1),last=new Date(y,m+1,0),days=[];for(let i=0;i<first.getDay();i++)days.push(null);for(let d=1;d<=last.getDate();d++)days.push(new Date(y,m,d));let map={};[...(appData.activities||[]).map(r=>({...r,_t:(r.kind||'予定')+' '+(r.memo||r.place||'')})),...(appData.tournament_dates||[]).map(r=>({...r,_t:'🏆 '+(r.display_title||r.title||'大会')}))].forEach(r=>{let d=parseDate(r.date);if(d&&d.getFullYear()==y&&d.getMonth()==m){let k=dateKey(d);(map[k] ||= []).push(r._t)}});let today=dateKey(new Date());document.getElementById('calendarDays').innerHTML=days.map(d=>{if(!d)return'<div class="day"></div>';let k=dateKey(d),ev=map[k]||[],cls=['day'];if(ev.length)cls.push('has');if(k==today)cls.push('today');return '<div class="'+cls.join(' ')+'" onclick="showDay(\''+k+'\')"><div class="num">'+d.getDate()+'</div>'+ev.slice(0,2).map(e=>'<span class="mark">'+esc(e)+'</span>').join('')+'</div>'}).join('');showMonthSummary()}
function showDay(k){let rows=[...(appData.activities||[]).filter(r=>r.date==k).map(r=>({kind:r.kind,title:r.memo||r.place,meta:r.time})),...(appData.tournament_dates||[]).filter(r=>r.date==k).map(r=>({kind:'🏆 大会',title:r.display_title||r.title,meta:(r.area||'')+' '+(r.type||'')}))];document.getElementById('calendarDetail').innerHTML=rows.length?rows.map(r=>'<div class="card"><div class="date">'+esc(k)+'</div><div class="title">'+esc(r.kind)+' '+esc(r.title)+'</div><div class="meta">'+esc(r.meta)+'</div></div>').join(''):'<div class="empty">'+esc(k)+' の予定はありません</div>'}
function showMonthSummary(){let rows=sortRows([...(appData.activities||[]).map(r=>({date:r.date,kind:r.kind,title:r.memo||r.place,time:r.time})),...(appData.tournament_dates||[]).map(r=>({date:r.date,kind:'🏆 大会',title:r.display_title||r.title,time:''}))]).filter(r=>{let d=parseDate(r.date);return d&&d.getFullYear()==current.getFullYear()&&d.getMonth()==current.getMonth()});document.getElementById('calendarDetail').innerHTML=rows.length?rows.map(r=>'<div class="card"><div class="date">'+esc(r.date)+' '+esc(r.time)+'</div><div class="title">'+esc(r.kind)+' '+esc(r.title)+'</div></div>').join(''):'<div class="empty">この月の予定はありません</div>'}
function moveMonth(x){current=new Date(current.getFullYear(),current.getMonth()+x,1);renderCalendar()}function renderAll(){renderSchedule();renderTournaments();renderCalendar()}
function openAddModal(){document.getElementById('modalTitle').textContent='予定追加';document.getElementById('editIndex').value='';document.getElementById('fDate').value='';document.getElementById('fTime').value='';document.getElementById('fKind').value='🎾 練習';document.getElementById('fPlace').value='';document.getElementById('fMemo').value='';document.getElementById('deleteArea').style.display='none';document.getElementById('modalBg').classList.add('active')}
function openEditModal(i){let r=appData.activities[i];if(!r)return;document.getElementById('modalTitle').textContent='予定編集';document.getElementById('editIndex').value=i;document.getElementById('fDate').value=toInputDate(r.date);document.getElementById('fTime').value=r.time||'';document.getElementById('fKind').value=r.kind||'🎾 練習';document.getElementById('fPlace').value=r.place||'';document.getElementById('fMemo').value=r.memo||'';document.getElementById('deleteArea').style.display='grid';document.getElementById('modalBg').classList.add('active')}
function closeModal(){document.getElementById('modalBg').classList.remove('active')}
function saveActivityFromModal(){let row={date:toSlashDate(document.getElementById('fDate').value),time:document.getElementById('fTime').value,kind:document.getElementById('fKind').value,place:document.getElementById('fPlace').value.trim(),memo:document.getElementById('fMemo').value.trim()};if(!row.date&&!row.place&&!row.memo){alert('日付・場所・メモのどれかを入力してください');return}let idx=document.getElementById('editIndex').value;if(idx===''){appData.activities.push(row)}else{appData.activities[Number(idx)]=row}saveLocal();closeModal();renderAll()}
function deleteActivityFromModal(){let idx=Number(document.getElementById('editIndex').value);if(confirm('この予定を削除しますか？')){appData.activities.splice(idx,1);saveLocal();closeModal();renderAll()}}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});loadData();
</script>
</body></html>
