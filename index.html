<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>I-Tennis Mobile</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#07522d">
<style>
body{margin:0;background:#f7fbf8;color:#24332B;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}
header{position:sticky;top:0;background:#07522d;color:white;padding:14px 16px;z-index:10}
h1{margin:0;font-size:21px}
header p{margin:4px 0 0;font-size:12px;color:#cde4d4}

.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px;background:white;position:sticky;top:57px;z-index:9;border-bottom:1px solid #cde4d4}
.tabs button{border:1px solid #cde4d4;background:#eaf7ef;color:#07522d;border-radius:999px;padding:11px;font-weight:700;font-size:14px}
.tabs button.active{background:#08763d;color:white}

main{padding:12px;max-width:720px;margin:auto}
.section{display:none}
.section.active{display:block}
.card{background:white;border:1px solid #cde4d4;border-radius:14px;padding:13px;margin-bottom:10px}
.date{font-weight:800;color:#07522d;margin-bottom:5px}
.title{font-weight:700}
.meta{color:#6b7a70;font-size:13px;margin-top:4px}
.empty{text-align:center;color:#6b7a70;padding:35px;background:white;border:1px dashed #cde4d4;border-radius:14px}

.toolbar{display:flex;gap:8px;margin-bottom:10px}
.toolbar input{flex:1;border:1px solid #cde4d4;border-radius:10px;padding:10px;font-size:15px}
.toolbar button{border:0;background:#08763d;color:white;border-radius:10px;padding:10px 12px;font-weight:800}

.notice{background:#fff8d6;border:1px solid #f0d98c;border-radius:12px;padding:10px;margin-bottom:10px;font-size:13px;color:#5b4b00}
.notice.synced{background:#e9f7ee;border-color:#a9d9b8;color:#0d5c33}
.notice.offline{background:#fdeceb;border-color:#f3b8b0;color:#7a2a1e}

.calendar{background:white;border:1px solid #cde4d4;border-radius:14px;overflow:hidden;margin-bottom:12px}
.cal-head{display:flex;justify-content:space-between;align-items:center;background:#6750A4;color:white;padding:10px;font-weight:800}
.cal-head button{background:white;color:#6750A4;border:0;border-radius:8px;padding:6px 12px;font-weight:800;font-size:15px}

.week,.days{display:grid;grid-template-columns:repeat(7,1fr)}
.week div{text-align:center;padding:7px 0;font-size:12px;font-weight:800;background:#f5f8f5}
.week .sun{color:#d93025!important}
.week .sat{color:#1a73e8!important}

.day{min-height:64px;border-right:1px solid #edf3ef;border-bottom:1px solid #edf3ef;padding:5px 4px;font-size:12px}
.day.has{background:#f4fbf6}
.day.today{background:#fff3bf}
.day.selected{outline:2px solid #08763d;outline-offset:-2px;background:#dff3e6}
.day.sunday .num{color:#d93025}
.day.saturday .num{color:#1a73e8}
.day.holiday .num{color:#d93025}
.num{font-weight:800;font-size:14px}
.holiday-tag{display:block;font-size:9px;color:#d93025;font-weight:700}
.mark{display:block;margin-top:2px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#07522d;font-weight:700}

.modal-bg{display:none;position:fixed;inset:0;background:#0007;z-index:99;padding:18px;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:white;border-radius:16px;width:100%;max-width:430px;padding:16px;max-height:90vh;overflow:auto}
.modal h2{margin:0 0 12px;color:#07522d}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:800;color:#6b7a70;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1px solid #cde4d4;border-radius:10px;padding:10px;font-size:16px;box-sizing:border-box}
.field textarea{min-height:70px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.actions button{border:0;border-radius:10px;padding:11px;font-weight:800}
.save{background:#08763d;color:white}
.cancel{background:#e9efe9;color:#244}
.delete{background:#b3261e;color:white}
</style></head>
<body>

<header>
  <h1>🎾 I-Tennis Mobile</h1>
  <p id="updated">読み込み中...</p>
</header>

<nav class="tabs">
  <button id="tabSchedule" class="active" onclick="showTab('schedule')">📅 予定</button>
  <button id="tabCalendar" onclick="showTab('calendar')">🗓 カレンダー</button>
</nav>

<main>
  <section id="schedule" class="section active">
    <div id="syncNotice" class="notice">読み込み中...</div>
    <div class="toolbar">
      <input id="searchSchedule" placeholder="予定を検索" oninput="renderAll()">
      <button onclick="openAddModal()">＋追加</button>
    </div>
    <div id="scheduleList"></div>
  </section>

  <section id="calendar" class="section">
    <div class="calendar">
      <div class="cal-head">
        <button onclick="moveMonth(-1)">◀</button>
        <div id="calTitle"></div>
        <button onclick="moveMonth(1)">▶</button>
      </div>
      <div class="week">
        <div class="sun">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="sat">土</div>
      </div>
      <div id="calendarDays" class="days"></div>
    </div>
    <div id="calendarDetail"></div>
  </section>
</main>

<div id="modalBg" class="modal-bg">
  <div class="modal">
    <h2 id="modalTitle">予定追加</h2>
    <input type="hidden" id="fId">
    <div class="field"><label>日付</label><input id="fDate" type="date"></div>
    <div class="field"><label>時間</label><input id="fTime" type="time"></div>
    <div class="field">
      <label>種類</label>
      <select id="fKind">
        <option>🎾 練習</option>
        <option>🏆 大会</option>
        <option>🍽 食事</option>
        <option>📦 仕事</option>
        <option>📝 その他</option>
      </select>
    </div>
    <div class="field"><label>場所</label><input id="fPlace"></div>
    <div class="field"><label>メモ</label><textarea id="fMemo"></textarea></div>
    <div class="actions">
      <button class="cancel" onclick="closeModal()">キャンセル</button>
      <button class="save" onclick="saveActivityFromModal()">保存</button>
    </div>
    <div class="actions" id="deleteArea" style="display:none;grid-template-columns:1fr;margin-top:8px">
      <button class="delete" onclick="deleteActivityFromModal()">この予定を削除</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ===================================================================
   設定：Supabaseプロジェクトを作成したら、この2つを書き換えてください。
   未設定（YOUR_ のまま）の間は自動的に「ローカル保存のみ」モードで動作します。
=================================================================== */
const SUPABASE_URL = 'https://lcxfjmhhvjxjsnxmklui.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_FkiwCZf-PrUukJwc6edXUA_DeAzzALW';
const TABLE = 'activities';

/* ===================================================================
   ローカル保存（オフラインキャッシュ）
   - STORAGE_KEY : 現在の予定一覧（id / updated_at / deleted 付き）
   - PENDING_KEY : まだSupabaseへ送れていない変更の待ち行列
=================================================================== */
const STORAGE_KEY = 'i_tennis_mobile_activities_v2';
const OLD_STORAGE_KEY = 'i_tennis_mobile_activities_v1'; // 旧版からの移行用
const PENDING_KEY = 'i_tennis_mobile_pending_sync_v1';

let appData = { activities: [] };
let current = new Date();
let selectedDateKey = null;
let supabase = null;
let syncMode = 'local'; // 'local'（未設定）/ 'online'（Supabase設定済み）

/* ---------- ユーティリティ ---------- */
function uuid(){
  if (crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0, v=c=='x'?r:(r&0x3|0x8); return v.toString(16);
  });
}
function nowIso(){ return new Date().toISOString(); }
function parseDate(s){
  if(!s) return null;
  let m = String(s).replace(/[年月.-]/g,'/').replace(/日/g,'').match(/(20\d{2})\/(\d{1,2})\/(\d{1,2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3]) : null;
}
function toSlashDate(v){ if(!v) return ''; if(v.includes('-')){ let a=v.split('-'); return a[0]+'/'+a[1]+'/'+a[2]; } return v; }
function toInputDate(v){ let d=parseDate(v); return d ? d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') : ''; }
function dateKey(d){ return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }
function esc(v){ return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sortRows(r){ return [...r].sort((a,b)=>(parseDate(a.date)?.getTime()||9e15)-(parseDate(b.date)?.getTime()||9e15)||String(a.time||'').localeCompare(String(b.time||''))); }

/* ---------- 日本の祝日判定（Windows版と同じロジックをJSに移植） ---------- */
function nthWeekday(year, month, jsWeekday, n){ // jsWeekday: 0=日,1=月...6=土
  const first = new Date(year, month-1, 1).getDay();
  const add = (jsWeekday - first + 7) % 7;
  return 1 + add + 7*(n-1);
}
function holidayName(year, month, day){
  const fixed = {
    '1-1':'元日', '2-11':'建国記念の日', '2-23':'天皇誕生日', '4-29':'昭和の日',
    '5-3':'憲法記念日', '5-4':'みどりの日', '5-5':'こどもの日', '8-11':'山の日',
    '11-3':'文化の日', '11-23':'勤労感謝の日'
  };
  if (fixed[month+'-'+day]) return fixed[month+'-'+day];
  if (month===1 && day===nthWeekday(year,1,1,2)) return '成人の日';
  if (month===7 && day===nthWeekday(year,7,1,3)) return '海の日';
  if (month===9 && day===nthWeekday(year,9,1,3)) return '敬老の日';
  if (month===10 && day===nthWeekday(year,10,1,2)) return 'スポーツの日';
  if (month===3){ const v=Math.floor(20.8431+0.242194*(year-1980)-Math.floor((year-1980)/4)); if(day===v) return '春分の日'; }
  if (month===9){ const v=Math.floor(23.2488+0.242194*(year-1980)-Math.floor((year-1980)/4)); if(day===v) return '秋分の日'; }
  const special = {'2020-7-23':'海の日','2020-7-24':'スポーツの日','2020-8-10':'山の日','2021-7-22':'海の日','2021-7-23':'スポーツの日','2021-8-8':'山の日','2021-8-9':'振替休日'};
  if (special[year+'-'+month+'-'+day]) return special[year+'-'+month+'-'+day];
  const d = new Date(year, month-1, day);
  if (d.getDay()===1){ // 月曜なら前日(日曜)が祝日だったか確認 → 振替休日
    const y = new Date(year, month-1, day-1);
    if (y.getDay()===6+1-1 && holidayName(y.getFullYear(), y.getMonth()+1, y.getDate())) { /* noop, 下のisSundayで判定 */ }
    if (y.getDay()===0 && holidayName(y.getFullYear(), y.getMonth()+1, y.getDate())) return '振替休日';
  }
  return '';
}

/* ---------- ローカル保存の読み書き ---------- */
function migrateOldStorageIfNeeded(){
  if (localStorage.getItem(STORAGE_KEY)) return;
  const old = localStorage.getItem(OLD_STORAGE_KEY);
  if (!old) return;
  try{
    const rows = JSON.parse(old) || [];
    const migrated = rows.map(r => ({ ...r, id: r.id || uuid(), updated_at: r.updated_at || nowIso(), deleted: false }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
  }catch(e){}
}
function loadLocal(){
  migrateOldStorageIfNeeded();
  const s = localStorage.getItem(STORAGE_KEY);
  if (s){ try{ appData.activities = JSON.parse(s) || []; }catch(e){ appData.activities = []; } }
}
function saveLocalOnly(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData.activities));
}
function getPending(){
  try{ return JSON.parse(localStorage.getItem(PENDING_KEY)) || []; }catch(e){ return []; }
}
function setPending(list){ localStorage.setItem(PENDING_KEY, JSON.stringify(list)); }
function queuePending(id, op){ // op: 'upsert' | 'delete'
  const list = getPending().filter(p => p.id !== id);
  list.push({ id, op });
  setPending(list);
}
function clearPending(id){ setPending(getPending().filter(p => p.id !== id)); }

/* ---------- Supabase連携（online同期） ---------- */
function initSupabase(){
  if (!SUPABASE_URL || SUPABASE_URL.includes('YOUR_') || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.includes('YOUR_')) {
    syncMode = 'local';
    return;
  }
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  syncMode = 'online';
}
async function fetchRemote(){
  if (!supabase) return null;
  const { data, error } = await supabase.from(TABLE).select('*');
  if (error){ console.warn('Supabase fetch error', error); return null; }
  return data;
}
async function pushRow(row){
  if (!supabase) { queuePending(row.id, 'upsert'); return false; }
  const { error } = await supabase.from(TABLE).upsert(row, { onConflict: 'id' });
  if (error){ console.warn('Supabase upsert error', error); queuePending(row.id, 'upsert'); return false; }
  clearPending(row.id);
  return true;
}
async function pushDelete(id){
  if (!supabase) { queuePending(id, 'delete'); return false; }
  const { error } = await supabase.from(TABLE).update({ deleted: true, updated_at: nowIso() }).eq('id', id);
  if (error){ console.warn('Supabase delete error', error); queuePending(id, 'delete'); return false; }
  clearPending(id);
  return true;
}
async function flushPending(){
  if (!supabase) return;
  const list = getPending();
  for (const p of list){
    if (p.op === 'delete'){
      await pushDelete(p.id);
    } else {
      const row = appData.activities.find(r => r.id === p.id);
      if (row) await pushRow(row); else clearPending(p.id);
    }
  }
}
function mergeRemoteIntoLocal(remoteRows){
  if (!remoteRows) return;
  const pendingIds = new Set(getPending().map(p => p.id));
  const localById = new Map(appData.activities.map(r => [r.id, r]));
  remoteRows.forEach(remote => {
    if (pendingIds.has(remote.id)) return; // 未送信のローカル編集を上書きしない
    if (remote.deleted){ localById.delete(remote.id); return; }
    const local = localById.get(remote.id);
    if (!local || !local.updated_at || new Date(remote.updated_at) >= new Date(local.updated_at)) {
      localById.set(remote.id, remote);
    }
  });
  appData.activities = Array.from(localById.values());
  saveLocalOnly();
}
function subscribeRealtime(){
  if (!supabase) return;
  supabase.channel('activities-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, async () => {
      const remote = await fetchRemote();
      mergeRemoteIntoLocal(remote);
      renderAll();
    })
    .subscribe();
}

/* ---------- 起動 ---------- */
async function loadData(){
  loadLocal();
  initSupabase();
  if (syncMode === 'online'){
    const remote = await fetchRemote();
    if (remote){
      mergeRemoteIntoLocal(remote);
      await flushPending();
      subscribeRealtime();
    }
  }
  updateHeaderAndNotice();
  let d = (appData.activities||[]).map(x=>parseDate(x.date)).find(Boolean);
  if (d) current = new Date(d.getFullYear(), d.getMonth(), 1);
  renderAll();
}
window.addEventListener('online', async () => {
  if (syncMode === 'online'){ await flushPending(); const remote = await fetchRemote(); mergeRemoteIntoLocal(remote); }
  updateHeaderAndNotice(); renderAll();
});
window.addEventListener('offline', () => { updateHeaderAndNotice(); });

function updateHeaderAndNotice(){
  document.getElementById('updated').textContent = '更新: ' + new Date().toLocaleString('ja-JP');
  const el = document.getElementById('syncNotice');
  const pendingCount = getPending().length;
  if (syncMode !== 'online'){
    el.className = 'notice';
    el.textContent = '予定はこのスマホ内に保存されます。Supabase未設定のためWindows同期はオフです。';
  } else if (!navigator.onLine){
    el.className = 'notice offline';
    el.textContent = '現在オフラインです。予定はスマホ内に保存され、オンライン復帰後に自動で同期します。';
  } else if (pendingCount > 0){
    el.className = 'notice offline';
    el.textContent = '未送信の変更が' + pendingCount + '件あります。再同期を試みています…';
  } else {
    el.className = 'notice synced';
    el.textContent = 'Supabaseに同期しています。Windows版との同期は次の段階です。';
  }
}

/* ---------- 画面切替 ---------- */
function showTab(n){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(n).classList.add('active');
  document.getElementById('tab'+n[0].toUpperCase()+n.slice(1)).classList.add('active');
  renderAll();
}

/* ---------- 予定一覧 ---------- */
function renderSchedule(){
  let q = document.getElementById('searchSchedule').value.toLowerCase();
  let rows = sortRows(appData.activities||[]).filter(r =>
    [r.date,r.time,r.place,r.kind,r.memo].join(' ').toLowerCase().includes(q)
  );
  document.getElementById('scheduleList').innerHTML = rows.length
    ? rows.map(r =>
        '<div class="card" onclick="openEditModal(\''+r.id+'\')">'+
          '<div class="date">'+esc(r.date)+' '+esc(r.time)+'</div>'+
          '<div class="title">'+esc(r.memo||r.place||r.kind)+'</div>'+
          '<div class="meta">'+esc(r.kind)+' '+esc(r.place)+'</div>'+
        '</div>'
      ).join('')
    : '<div class="empty">予定はありません<br>＋追加から登録できます</div>';
}

/* ---------- カレンダー ---------- */
function renderCalendar(){
  let y = current.getFullYear(), m = current.getMonth();
  document.getElementById('calTitle').textContent = y+'年'+(m+1)+'月';
  let first = new Date(y,m,1), last = new Date(y,m+1,0), days = [];
  for (let i=0;i<first.getDay();i++) days.push(null);
  for (let d=1; d<=last.getDate(); d++) days.push(new Date(y,m,d));

  let map = {};
  (appData.activities||[]).forEach(r => {
    let d = parseDate(r.date);
    if (d && d.getFullYear()===y && d.getMonth()===m){
      let k = dateKey(d);
      (map[k] ||= []).push((r.kind||'予定')+' '+(r.memo||r.place||''));
    }
  });

  let today = dateKey(new Date());
  document.getElementById('calendarDays').innerHTML = days.map(d => {
    if (!d) return '<div class="day"></div>';
    let k = dateKey(d);
    let ev = map[k] || [];
    let hName = holidayName(d.getFullYear(), d.getMonth()+1, d.getDate());
    let cls = ['day'];
    if (ev.length) cls.push('has');
    if (k===today) cls.push('today');
    if (k===selectedDateKey) cls.push('selected');
    if (d.getDay()===0) cls.push('sunday');
    if (d.getDay()===6) cls.push('saturday');
    if (hName) cls.push('holiday');
    return '<div class="'+cls.join(' ')+'" onclick="selectDay(\''+k+'\')">'+
      '<div class="num">'+d.getDate()+'</div>'+
      (hName ? '<span class="holiday-tag">🎌'+esc(hName.slice(0,4))+'</span>' : '') +
      ev.slice(0,2).map(e=>'<span class="mark">'+esc(e)+'</span>').join('') +
    '</div>';
  }).join('');

  if (selectedDateKey) { showDay(selectedDateKey); } else { showMonthSummary(); }
}
function selectDay(k){ selectedDateKey = (selectedDateKey===k) ? null : k; renderCalendar(); }
function showDay(k){
  let rows = (appData.activities||[]).filter(r => r.date===k).map(r => ({ id:r.id, kind:r.kind, title:r.memo||r.place, meta:r.time }));
  document.getElementById('calendarDetail').innerHTML = rows.length
    ? rows.map(r => '<div class="card" onclick="openEditModal(\''+r.id+'\')"><div class="date">'+esc(k)+'</div><div class="title">'+esc(r.kind)+' '+esc(r.title)+'</div><div class="meta">'+esc(r.meta)+'</div></div>').join('')
    : '<div class="empty">'+esc(k)+' の予定はありません</div>';
}
function showMonthSummary(){
  let rows = sortRows((appData.activities||[]).map(r => ({ id:r.id, date:r.date, kind:r.kind, title:r.memo||r.place, time:r.time })))
    .filter(r => { let d=parseDate(r.date); return d && d.getFullYear()===current.getFullYear() && d.getMonth()===current.getMonth(); });
  document.getElementById('calendarDetail').innerHTML = rows.length
    ? rows.map(r => '<div class="card" onclick="openEditModal(\''+r.id+'\')"><div class="date">'+esc(r.date)+' '+esc(r.time)+'</div><div class="title">'+esc(r.kind)+' '+esc(r.title)+'</div></div>').join('')
    : '<div class="empty">この月の予定はありません</div>';
}
function moveMonth(x){ current = new Date(current.getFullYear(), current.getMonth()+x, 1); selectedDateKey = null; renderCalendar(); }

function renderAll(){ updateHeaderAndNotice(); renderSchedule(); renderCalendar(); }

/* ---------- 予定追加・修正・削除 ---------- */
function openAddModal(){
  document.getElementById('modalTitle').textContent = '予定追加';
  document.getElementById('fId').value = '';
  document.getElementById('fDate').value = selectedDateKey ? toInputDate(selectedDateKey) : '';
  document.getElementById('fTime').value = '';
  document.getElementById('fKind').value = '🎾 練習';
  document.getElementById('fPlace').value = '';
  document.getElementById('fMemo').value = '';
  document.getElementById('deleteArea').style.display = 'none';
  document.getElementById('modalBg').classList.add('active');
}
function openEditModal(id){
  let r = appData.activities.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalTitle').textContent = '予定編集';
  document.getElementById('fId').value = r.id;
  document.getElementById('fDate').value = toInputDate(r.date);
  document.getElementById('fTime').value = r.time || '';
  document.getElementById('fKind').value = r.kind || '🎾 練習';
  document.getElementById('fPlace').value = r.place || '';
  document.getElementById('fMemo').value = r.memo || '';
  document.getElementById('deleteArea').style.display = 'grid';
  document.getElementById('modalBg').classList.add('active');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('active'); }

async function saveActivityFromModal(){
  let id = document.getElementById('fId').value;
  let row = {
    id: id || uuid(),
    date: toSlashDate(document.getElementById('fDate').value),
    time: document.getElementById('fTime').value,
    kind: document.getElementById('fKind').value,
    place: document.getElementById('fPlace').value.trim(),
    memo: document.getElementById('fMemo').value.trim(),
    updated_at: nowIso(),
    deleted: false
  };
  if (!row.date && !row.place && !row.memo){ alert('日付・場所・メモのどれかを入力してください'); return; }

  let idx = appData.activities.findIndex(x => x.id === row.id);
  if (idx === -1) appData.activities.push(row); else appData.activities[idx] = row;
  saveLocalOnly();
  closeModal();
  renderAll();

  await pushRow(row); // 失敗時は自動でpending queueに積まれ、オンライン復帰時に再送されます
  updateHeaderAndNotice();
}
async function deleteActivityFromModal(){
  let id = document.getElementById('fId').value;
  if (!confirm('この予定を削除しますか？')) return;
  appData.activities = appData.activities.filter(x => x.id !== id);
  saveLocalOnly();
  closeModal();
  renderAll();

  await pushDelete(id);
  updateHeaderAndNotice();
}

document.getElementById('modalBg').addEventListener('click', e => { if (e.target.id==='modalBg') closeModal(); });
loadData();

/* ---------- PWA: service worker登録（オフライン起動・ホーム画面追加用） ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('Service worker registration failed', e));
  });
}
</script>
