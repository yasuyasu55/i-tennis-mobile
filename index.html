<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>I-Tennis Mobile</title>
<style>
body{margin:0;background:#f7fbf8;color:#24332B;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",sans-serif}header{position:sticky;top:0;background:#07522d;color:#fff;padding:14px 16px;z-index:10}h1{margin:0;font-size:21px}header p{margin:4px 0 0;font-size:12px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;background:#fff;position:sticky;top:57px;z-index:9}.tabs button{border:1px solid #cde4d4;background:#eaf7ef;color:#07522d;border-radius:999px;padding:9px;font-weight:700}.tabs button.active{background:#08763d;color:#fff}main{padding:12px;max-width:720px;margin:auto}.section{display:none}.section.active{display:block}.card{background:#fff;border:1px solid #cde4d4;border-radius:14px;padding:13px;margin-bottom:10px}.date{font-weight:800;color:#07522d;margin-bottom:5px}.title{font-weight:700}.meta{color:#6b7a70;font-size:13px;margin-top:4px}.empty{text-align:center;color:#6b7a70;padding:42px 16px;background:#fff;border:1px dashed #cde4d4;border-radius:14px}.toolbar input{width:100%;border:1px solid #cde4d4;border-radius:10px;padding:10px;font-size:15px;margin-bottom:10px}.notice{background:#fff8d6;border:1px solid #f0d98c;border-radius:12px;padding:10px;margin-bottom:10px;font-size:13px}.calendar{background:#fff;border:1px solid #cde4d4;border-radius:14px;overflow:hidden;margin-bottom:12px}.cal-head{display:flex;justify-content:space-between;align-items:center;background:#6750A4;color:#fff;padding:10px;font-weight:800}.cal-head button{background:#fff;color:#6750A4;border:0;border-radius:8px;padding:6px 10px;font-weight:800}.week,.days{display:grid;grid-template-columns:repeat(7,1fr)}.week div{text-align:center;padding:7px 0;font-size:12px;font-weight:800;background:#f5f8f5}.day{min-height:54px;border-right:1px solid #edf3ef;border-bottom:1px solid #edf3ef;padding:5px;font-size:12px}.day.has{background:#f4fbf6}.day.today{background:#fff3bf}.num{font-weight:800}.mark{display:block;margin-top:2px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#07522d;font-weight:700}
</style></head><body>
<header><h1>🎾 I-Tennis Mobile</h1><p id="updated">読み込み中...</p></header>
<nav class="tabs"><button id="tabSchedule" class="active" onclick="showTab('schedule')">📅 予定</button><button id="tabTournaments" onclick="showTab('tournaments')">🏆 大会</button><button id="tabCalendar" onclick="showTab('calendar')">🗓 カレンダー</button></nav>
<main>
<section id="schedule" class="section active"><div class="notice">まずはスマホ表示の試作です。次にWindows版データと同期します。</div><div class="toolbar"><input id="searchSchedule" placeholder="予定を検索" oninput="renderAll()"></div><div id="scheduleList"></div></section>
<section id="tournaments" class="section"><div class="toolbar"><input id="searchTournament" placeholder="大会を検索" oninput="renderAll()"></div><div id="tournamentList"></div></section>
<section id="calendar" class="section"><div class="calendar"><div class="cal-head"><button onclick="moveMonth(-1)">◀</button><div id="calTitle"></div><button onclick="moveMonth(1)">▶</button></div><div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div><div id="calendarDays" class="days"></div></div><div id="calendarDetail"></div></section>
</main>
<script>
let appData={activities:[],tournament_dates:[],favorites:[]},current=new Date();
function parseDate(s){if(!s)return null;let m=String(s).replace(/[年月.-]/g,'/').replace(/日/g,'').match(/(20\d{2})\/(\d{1,2})\/(\d{1,2})/);return m?new Date(+m[1],+m[2]-1,+m[3]):null}
function dateKey(d){return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function loadData(){try{appData=await (await fetch('i_tennis_mobile_data.json?ts='+Date.now())).json()}catch(e){appData={activities:[],tournament_dates:[],updated_at:'読み込み失敗'}}document.getElementById('updated').textContent=`更新: ${appData.updated_at||''} / ${appData.version||''}`;let d=[...(appData.activities||[]),...(appData.tournament_dates||[])].map(x=>parseDate(x.date)).find(Boolean);if(d)current=new Date(d.getFullYear(),d.getMonth(),1);renderAll()}
function showTab(n){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));document.getElementById(n).classList.add('active');document.getElementById('tab'+n[0].toUpperCase()+n.slice(1)).classList.add('active');renderAll()}
function sortRows(r){return [...r].sort((a,b)=>(parseDate(a.date)?.getTime()||9e15)-(parseDate(b.date)?.getTime()||9e15))}
function renderSchedule(){let q=document.getElementById('searchSchedule').value.toLowerCase();let rows=sortRows(appData.activities||[]).filter(r=>[r.date,r.time,r.place,r.kind,r.memo].join(' ').toLowerCase().includes(q));document.getElementById('scheduleList').innerHTML=rows.length?rows.map(r=>`<div class="card"><div class="date">${esc(r.date)} ${esc(r.time)}</div><div class="title">${esc(r.memo||r.place||r.kind)}</div><div class="meta">${esc(r.kind)} ${esc(r.place)}</div></div>`).join(''):'<div class="empty">予定はありません</div>'}
function renderTournaments(){let q=document.getElementById('searchTournament').value.toLowerCase();let rows=sortRows(appData.tournament_dates||[]).filter(r=>[r.date,r.display_title,r.title,r.area,r.type].join(' ').toLowerCase().includes(q));document.getElementById('tournamentList').innerHTML=rows.length?rows.map(r=>`<div class="card"><div class="date">${esc(r.date)}</div><div class="title">🏆 ${esc(r.display_title||r.title||'大会')}</div><div class="meta">${esc(r.area)} ${esc(r.type)}</div></div>`).join(''):'<div class="empty">登録大会はありません</div>'}
function renderCalendar(){let y=current.getFullYear(),m=current.getMonth();document.getElementById('calTitle').textContent=`${y}年${m+1}月`;let first=new Date(y,m,1),last=new Date(y,m+1,0),days=[];for(let i=0;i<first.getDay();i++)days.push(null);for(let d=1;d<=last.getDate();d++)days.push(new Date(y,m,d));let map={};[...(appData.activities||[]).map(r=>({...r,_t:(r.kind||'予定')+' '+(r.memo||r.place||'')})),...(appData.tournament_dates||[]).map(r=>({...r,_t:'🏆 '+(r.display_title||r.title||'大会')}))].forEach(r=>{let d=parseDate(r.date);if(d&&d.getFullYear()==y&&d.getMonth()==m){let k=dateKey(d);(map[k] ||= []).push(r._t)}});let today=dateKey(new Date());document.getElementById('calendarDays').innerHTML=days.map(d=>{if(!d)return'<div class="day"></div>';let k=dateKey(d),ev=map[k]||[],cls=['day'];if(ev.length)cls.push('has');if(k==today)cls.push('today');return`<div class="${cls.join(' ')}" onclick="showDay('${k}')"><div class="num">${d.getDate()}</div>${ev.slice(0,2).map(e=>`<span class="mark">${esc(e)}</span>`).join('')}</div>`}).join('');showMonthSummary()}
function showDay(k){let rows=[...(appData.activities||[]).filter(r=>r.date==k).map(r=>({kind:r.kind,title:r.memo||r.place,meta:r.time})),...(appData.tournament_dates||[]).filter(r=>r.date==k).map(r=>({kind:'🏆 大会',title:r.display_title||r.title,meta:(r.area||'')+' '+(r.type||'')}))];document.getElementById('calendarDetail').innerHTML=rows.length?rows.map(r=>`<div class="card"><div class="date">${esc(k)}</div><div class="title">${esc(r.kind)} ${esc(r.title)}</div><div class="meta">${esc(r.meta)}</div></div>`).join(''):`<div class="empty">${esc(k)} の予定はありません</div>`}
function showMonthSummary(){let rows=sortRows([...(appData.activities||[]).map(r=>({date:r.date,kind:r.kind,title:r.memo||r.place})),...(appData.tournament_dates||[]).map(r=>({date:r.date,kind:'🏆 大会',title:r.display_title||r.title}))]).filter(r=>{let d=parseDate(r.date);return d&&d.getFullYear()==current.getFullYear()&&d.getMonth()==current.getMonth()});document.getElementById('calendarDetail').innerHTML=rows.length?rows.map(r=>`<div class="card"><div class="date">${esc(r.date)}</div><div class="title">${esc(r.kind)} ${esc(r.title)}</div></div>`).join(''):'<div class="empty">この月の予定はありません</div>'}
function moveMonth(x){current=new Date(current.getFullYear(),current.getMonth()+x,1);renderCalendar()}function renderAll(){renderSchedule();renderTournaments();renderCalendar()}loadData();
</script></body></html>
